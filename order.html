<!DOCTYPE html>
<html>
<head>
<title>Vamsi Milk</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#84fab0,#8fd3f4);
}

header{
background:#0077b6;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

section{
padding:30px;
text-align:center;
}

.form-box{
background:white;
padding:25px;
border-radius:15px;
width:320px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#28a745;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

.upi{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.upi-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.help{
background:white;
padding:25px;
width:320px;
margin:auto;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>
</head>

<body>

<header>
🐄 Vamsi Milk
</header>

<section>

<h2>Order Fresh Cow Milk</h2>

<div class="form-box">

<input id="name" placeholder="Full Name">
<input id="address" placeholder="Full Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<label>Morning Delivery</label>

<select id="morning">
<option>6:00 AM</option>
<option>6:30 AM</option>
<option>7:00 AM</option>
<option>7:30 AM</option>
<option>8:00 AM</option>
<option>8:30 AM</option>
<option>9:00 AM</option>
</select>

<label>Evening Delivery</label>

<select id="evening">
<option>6:30 PM</option>
<option>7:00 PM</option>
<option>7:30 PM</option>
<option>8:00 PM</option>
<option>8:30 PM</option>
</select>

<button onclick="sendOrder()">Add Cart & Send Order</button>

</div>

</section>

<section>

<h2>UPI Payment</h2>

<div class="upi">

<div class="upi-card">📱 PhonePe</div>
<div class="upi-card">💳 Google Pay</div>
<div class="upi-card">💰 Paytm</div>
<div class="upi-card">🏦 BHIM UPI</div>

</div>

<p><b>UPI Number: 7569664231 (Vamsi)</b></p>

</section>

<section>

<h2>Complaint / Help</h2>

<div class="help">

<textarea placeholder="Write complaint or help message"></textarea>

<button>Submit</button>

<p>📞 Contact Vamsi</p>
<p>📞 Contact Anil</p>

</div>

</section>

<footer>
© 2026 Vamsi Milk | All Rights Reserved Vamsi
</footer>

<script>

function sendOrder(){

let name=document.getElementById("name").value;
let address=document.getElementById("address").value;
let city=document.getElementById("city").value;
let pincode=document.getElementById("pincode").value;
let morning=document.getElementById("morning").value;
let evening=document.getElementById("evening").value;

let msg="New Milk Order%0A"
+"Name:"+name+"%0A"
+"Address:"+address+"%0A"
+"City:"+city+"%0A"
+"Pincode:"+pincode+"%0A"
+"Morning:"+morning+"%0A"
+"Evening:"+evening;

window.open("https://wa.me/917569664231?text="+msg);

}

</script>

</body>
</html>
